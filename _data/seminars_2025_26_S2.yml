- date: 17 April 2026
  speaker: Amin Sabir (University of Bath)
  url: https://people.bath.ac.uk/as5057/
  zoom: 1
  title: Learned regularisation methods for light-sheet fluorescence microscopy
  abstract: Light-sheet fluorescence microscopy (LSFM) enables high-speed volumetric imaging of biological samples (e.g. cells and plant tissue) with reduced phototoxicity compared to conventional fluorescence techniques. However, image quality is often degraded by spatially varying blur and mixed Poisson-Gaussian noise. While physics-based frameworks account for these effects, they often fail to capture the complex structural variability of biological specimens. Conversely, "unrolled" deep learning methods, such as the Richardson-Lucy network (RLN), can produce high-quality reconstructions but lack flexibility, requiring retraining when imaging conditions change.<br><br> To address these challenges, we propose a modular reconstruction framework that decouples the physical imaging model from the learned image prior. Built upon structured primal-dual optimisation schemes, including the primal-dual three operator splitting (PD3O) and non-linear primal-dual hybrid gradient (PDHG) algorithms, our approach incorporates a learned gradient-step denoiser as an explicit component of the reconstruction algorithm. This learned component acts as a data-driven regulariser, promoting structurally consistent reconstructions while remaining independent of the forward model.<br><br> As a result, the same denoiser can be reused across different imaging modalities, such as LSFM, widefield, and confocal microscopy, by simply adapting the forward operator. Preliminary results on both synthetic and experimental datasets demonstrate the potential of this approach as a flexible and robust framework for high-quality microscopy reconstruction.

- date: 17 April 2026
  speaker: Matt Evans (University of Bath)
  url: https://mathrad.ac.uk/team/matt-evans/
  zoom: 1
  title: Preconditioning methods for polytopal discretisations of the Boltzmann transport equation
  abstract: The Boltzmann transport equation is a fundamental model in neutronics, but its numerical solution remains challenging in regimes arising from complex reactor geometries and material heterogeneities, where standard iterative schemes may converge slowly.<br><br> In this talk, we present a preconditioning strategy designed to reduce the contraction factor of such iterative methods, therefore accelerating convergence. The approach is developed in the context of polytopal discontinuous Galerkin discretisations.

- date: 24 April 2026
  speaker: Mostafa Meliani (University of Bath)
  url: https://m-meliani.github.io/
  zoom: 1
  title: Wavenumber-robust approximation for the Helmholtz equation
  abstract: The Helmholtz equation, which models time-harmonic wave propagation, is widely used in physical and industrial applications. Its mathematical and numerical analysis, however, poses significant technical challenges.<br><br> This talk provides an introduction to the Helmholtz equation, highlighting the main analytical and numerical difficulties it presents, as well as the general ideas used in the literature to address them. Finally, we briefly motivate and present a recent result on wavenumber-explicit approximation for the Helmholtz equation in the presence of Gevrey-regular obstacles.

- date: 1 May 2026
  speaker: Massimiliano Tamborrino (University of Warwick)
  url: https://warwick.ac.uk/fac/sci/statistics/staff/academic-research/tamborrino/
  zoom: 1
  title: Interface between stochastic numerics and (computational) statistics for stochastic differential equations
  abstract: Multivariate non-linear stochastic differential equations (SDEs) play a crucial role in several applications. Closed-form solutions or exact simulation schemes for nonlinear SDEs with non-globally Lipschitz terms or multiplicative noise are commonly unavailable, requiring the development of advanced numerical schemes. To this end, we advocate the use of numerical splitting schemes, which are shown to be not only mean-square convergent, but also capable of preserving important structural properties of the SDEs, such as hypoellipticity, geometric ergodicity and oscillatory dynamics. The impact of such schemes goes well beyond the numerical level though. Indeed, we show that inferential approaches (such as maximum likelihood estimation, Approximate Bayesian Computation or controlled Sequential Monte Carlo) based on splitting schemes outperform those based on standard numerical schemes (e.g. Euler-Maruyama) in terms of accuracy and computational speed. These results are illustrated on two broad classes of SDEs, with additive and multiplicative noise.

- date: 8 May 2026
  speaker: Libo Chen (University of Bath)
  url: https://samba.ac.uk/student/libo-chen/
  zoom: 1
  title: A Temporally Conditioned Diffusion Framework for Probabilistic Spatiotemporal Precipitation Downscaling
  abstract: "High resolution simulations are essential for accurately assessing localised impacts, yet traditional regional climate models are computationally expensive and difficult to scale. Diffusion models offer a promising data-driven alternative, but existing designs are largely static and fail to represent temporal evolution, limiting their use in weather and climate applications. In this paper, we propose a conditional diffusion model that generates realistic rainfall sequences with coherent spatial-temporal structures, conditioned on coarse-resolution atmospheric inputs. Our method has three key advantages over other methods: (1) it reduces computational costs by learning how to generate high-resolution outputs from coarse-resolution inputs; (2) it incorporates temporal conditioning into the diffusion process, enhancing consistency across multiple time steps; (3) it supports flexible conditioning on 22 atmospheric variables, including temperature, pressure, and humidity, thus enabling accurate reconstruction of fine-scale rainfall patterns even without direct precipitation input. Evaluated on the Met Office UKCP Local CPM dataset, the proposed model achieves spatially accurate and temporally coherent precipitation fields at 17.6 km resolution, outperforming a deterministic U-Net baseline on several accuracy metrics, while also demonstrating calibrated uncertainty. These results suggest temporally conditioned diffusion models provide an efficient and versatile framework for probabilistic weather and climate downscaling."

- date: 8 May 2026
  speaker: Daniel Hajnal (University of Bath)
  url: https://mathrad.ac.uk/team/daniel-hajnal/
  zoom: 1
  title: Uncertainty quantification in radiotherapy using multifidelity Monte Carlo
  abstract: "Roughly one in four people in the UK is expected to receive radiotherapy treatment in their lifetime. The clinical challenge lies in directing ionising radiation towards tumours while minimising damage done to healthy tissues. This makes the process particularly error prone: targeting inaccuracies both compromise therapeutic efficacy and risk severe collateral damage to healthy organs. Consequently, robust uncertainty quantification (UQ) is essential.<br><br> In this talk, we introduce the multifidelity Monte Carlo framework by Peherstorfer et al. to the radiotherapy context. By leveraging the correlation between models of different fidelities, this approach significantly accelerates UQ. To conclude, numerical results will be shown, demonstrating the algorithm's clinical relevance and computational performance."

- date: 15 May 2026
  speaker: María Ignacia Fierro-Piccardo (University of Bath)
  url: https://uk.linkedin.com/in/ignacia-fp
  zoom: 1
  title: Accelerating RSRS for large scale Boundary Integral Equations
  abstract: "Recursive Strong Skeletonisation (RSS) [1] is an effective framework for compressing and solving structured linear systems, particularly those arising from boundary integral equations. Its randomised variant, RSRS [2], enables matrix-free computation by requiring only the spatial distribution of the degrees of freedom together with a black-box matrix-vector product. This makes it well suited for use as a preconditioner or even as a fast direct solver for problems with millions of unknowns.<br><br> Most implementations of RSS and RSRS focus on two-dimensional problems, where it remains efficient. In three dimensions, however, the growth in neighbouring interactions can significantly increase the computational cost, potentially limiting its practical usefulness. In this work, we present algorithmic improvements that accelerate RSRS for large-scale boundary integral equations and, more generally, for operators with hierarchical structure.<br><br> Our implementation is written in Rust and uses Rayon to parallelise both the compression and application stages, yielding substantial efficiency gains. Numerical experiments on boundary integral problems show significant speedups over baseline RSRS, demonstrating the potential of these advances to provide scalable direct solvers for challenging 3D applications.<br><br> [1] Minden, V., Ho, K. L., Damle, A., & Ying, L. (2017). A recursive skeletonization factorization based on strong admissibility. Multiscale Modeling & Simulation, 15(2), 768-796.<br> [2] Yesypenko, A., & Martinsson, P. G. (2023). Randomized Strong Recursive Skeletonization: Simultaneous compression and factorization of H-matrices in the Black-Box Setting. arXiv preprint arXiv:2311.01451"

- date: 29 May 2026
  speaker: Niklas Baumgarten (Heidelberg University)
  url: https://publish.obsidian.md/niklas-baumgarten/webpage/about
  zoom: 1
  title: Multilevel Stochastic Gradient Descent - Applications, Variants and Developments
  abstract: In this presentation, we give an introduction to multilevel stochastic gradient descent (MLSGD), a method that has demonstrated superior performance over standard batched stochastic gradient descent in terms of convergence speed, memory footprint, achievable accuracy, scalability and robustness.<br><br> We motivate the method at hand of PDE constrained optimal control problems under uncertainty and outline key ideas like the usage of multilevel Monte Carlo (MLMC) methods as gradient estimator.<br><br> We then present a budgeted, risk-averse and fully distributed variant capable of handling PDE problems causing substantial computational loads. Numerical results illustrate the cost reduction over standard SGD and the scalability of the approach on HPC hardware. We lastly present an outlook on future research direction.