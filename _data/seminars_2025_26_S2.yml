- date: 6 Feb 2026
  speaker: Shi Jin (Shanghai Jiao Tong University)
  url: https://ins.sjtu.edu.cn/people/shijin/
  zoom: 1
  title: Quantum Computations of Partial Differential Equations
  abstract: Quantum computers are designed based on quantum mechanics principle, they are most suitable to solve the Schrodinger equation, and linear PDEs (and ODEs) evolved by unitary operators. It is important to explore whether other problems in scientific computing, such as ODEs, PDEs, and linear algebra that arise in both classical and quantum systems which are not unitary evolution, can be handled by quantum computers.<br><br> We will present a systematic way to develop quantum simulation algorithms for general differential equations. Our basic framework is dimension lifting, that transfers non-autonomous ODEs/PDEs systems to autonomous ones, nonlinear PDEs to linear ones, and linear ones to Schrodinger type PDEs-coined "Schrodingerization" — with unitary evolutions. Our formulation allows both qubit and qumode (continuous-variable) formulations, and their hybridizations, and provides the foundation for analog quantum computing which are easier to realize in the near term. We will also present dimension lifting techniques for quantum simulation of stochastic DEs and PDEs with fractional derivatives, and quantum machine learning. A quantum simulation software — "UnitaryLab" — will also be introduced.

- date: 13 Feb 2026
  speaker: Mike Giles (University of Oxford)
  url: https://people.maths.ox.ac.uk/gilesm/
  zoom: 1
  title: MLMC analysis of the stochastic heat equation
  abstract: As a first step in my application of Multilevel Monte Carlo (MLMC) methods to stochastic PDEs driven by space-time white noise, in this talk I investigate 3 different approaches to generating coupled noise samples for the stochastic heat equation, and use Fourier analysis to analyse the resulting MLMC correction variance for 3 different output quantities of interest. Two key conclusions are a) a finite element construction is better than a finite volume construction, and b) for some outputs, Richardson extrapolation is needed to obtain the optimal complexity with the finite element and spectral constructions. The analysis is supported by numerical results.

- date: 20 Feb 2026
  speaker: Danny Barash (Ben-Gurion University)
  url: https://il.linkedin.com/in/danny-barash-7873b015
  zoom: 1
  title: 3D shape alignment with partial overlap
  abstract: "Current systems achieve high local match quality but still break global structure under symmetry, large viewpoint and scale changes, repeated patterns, occlusion, and domain shift between sensors or modalities. Matches that look locally correct can violate the object layout and destabilize optimization. This shows up on standard semantic correspondence tests and in applied settings. A practical way forward is to introduce geometry where it helps most. We propose lightweight cues in the features that encode orientation and left versus right, and simple constraints in the matcher based on relative distances, angles, and neighborhood order. This keeps appearance strengths while restoring structural consistency across a wide range of conditions. We will evaluate on widely used benchmarks and release a small, reproducible codebase that others can adopt. We would like to aim towards: encoding orientation and left versus right in local descriptors, constraining the matcher with basic geometric relations, and packaging a clean testbed with ablations and clear evaluation for reuse."

- date: 27 Feb 2026
  speaker: Lea Bogensperger (University of Zurich)
  url: https://leabogensperger.github.io/
  zoom: 1
  title: Latent Flow Matching for Protein Fitness Optimization
  abstract: The goal of protein fitness optimization is to discover new protein variants with enhanced fitness for specific biological functions. However, the vast search space, the sparsity of the fitness landscape, and the discrete nature of protein sequences pose significant challenges for gradient-based optimization. We present an approach that embeds protein sequences into a continuous latent space, where a flow matching prior is trained to capture the underlying distribution. Guided by an auxiliary fitness predictor, this framework enables the sampling of high-fitness protein sequences. Furthermore, we demonstrate that utilizing the compressed embeddings of pre-trained protein language models as the latent space further improves optimization performance.

- date: 6 March 2026
  speaker: Wenqi Zhu (University of Oxford)
  url: https://katewenqizhu.github.io/
  zoom: 1
  title: Beyond Second Order Methods for Nonconvex Optimization
  abstract: Traditionally, first-order gradient-based techniques, such as stochastic gradient descent (SGD), and second-order methods, such as the Newton method, have dominated the field of optimization. In recent years, high-order tensor methods with regularization for nonconvex optimization have garnered significant research interest. These methods offer superior local convergence rates, improved worst-case evaluation complexity, enhanced insights into data geometry through higher-order information, and better parallelization compared to SGD.<br><br> The most critical challenge in implementing the p-th order method (p ≥ 3) lies in efficiently minimizing the p-th order subproblem, which typically consists of a p-th degree multivariate Taylor polynomial combined with a (p+1)-th order regularization term. In this talk, we address the research gaps by characterizing the local and global optimality of the subproblem and investigating its potential NP-hardness. In this talk, we will introduce and discuss a series of provably convergent and efficient algorithms for minimizing the regularized subproblem both locally and globally, including the Quadratic Quartic Regularization Method (QQR), the Cubic Quartic Regularization Method (CQR), and the Sums-of-Squares Convex Taylor Method (SoS-C). More interestingly, our research adopts an AI-integrated approach, using the mathematical reasoning capabilities of large language models (LLMs) to verify the nonnegativity of multivariate polynomials. This problem is closely related to Hilbert's Seventeenth Problem and the challenge of globally minimizing subproblems.


- date: 13 March 2026
  speaker: Georgios Exarchakis (University of Bath)
  url: https://exarchakis.net/
  zoom: 1
  title: Solid Harmonic Wavelet Bispectrum for Image Analysis
  abstract: The Solid Harmonic Wavelet Bispectrum in 2D provides a multi-scale, rotation- and translation-covariant representation that preserves relative phase and captures higher-order interactions between wavelet responses. This representation encodes rich structural information in a data-efficient and interpretable form. Applications across texture classification, medical imaging, galaxy merger regression, and image reconstruction demonstrate that phase-sensitive, cross-scale interactions enhance discriminative power, model complex dependencies, and retain sufficient information for accurate reconstructions. By embedding roto-translation invariance and preserving relative phase, the operator captures structural features often lost in conventional scattering methods, enabling robust performance in low-data regimes. Cross-scale and higher-order interactions further enrich the representation, allowing nonlinear dependencies between features to be encoded without learning. Results show competitive or superior performance compared to deep learning models in tasks where symmetries and structural cues dominate, highlighting the potential of phase-sensitive, symmetry-aware wavelet representations as a versatile tool for signal and image analysis.

- date: 20 March 2026
  speaker: Daniel Burrows (IMI and University of Bath)
  url: https://samba.ac.uk/student/dan-burrows/
  zoom: 1
  title: Motion-enabled tomography via Gaussian Mixture Models
  abstract: Recovering the physical properties of objects in motion is a fundamental challenge across various scientific and industrial applications. When motion is sufficient to provide a fully informative sinogram relative to a fixed source-receiver system, Computerised Tomography (CT) offers a powerful means for recovering object properties, enabling automation and access to otherwise hidden information. To address this, we propose a general time-varying parametric model for Gaussian Mixture Models (GMMs) that explicitly describes angular velocity, projectile motion, and morphology specific to each constituent Gaussian. Leveraging the closure of GMMs under the ray transform, we derive an exact forward model that allows for reconstruction by fitting directly to observed sinogram data. The utility of using GMMs as a basis for reconstruction comes from their ability to approximate complicated mathematical functions with a high degree of accuracy [Zickert, Öktem, Yarman, 2022] [Zickert, Yarman, 2021].<br><br> To implement this reconstruction, we utilize suitable loss functions and the automatic differentiation capabilities of PyTorch to efficiently compute parameter estimates that characterise the approximating GMMs. Alongside motion and tomography models applicable to Euclidean spaces of arbitrary dimension, we provide a fully operational gradient-based optimization algorithm tailored for two-dimensional scenarios. Our results demonstrate accurate and robust performance on challenging simulated datasets, providing a credible foundation for extending the algorithm to arbitrary dimensions.

- date: 20 March 2026
  speaker: Kamran Arora (University of Bath)
  url: https://people.bath.ac.uk/ka679/
  zoom: 1
  title: A discontinuous Galerkin method for the Dean Kawasaki equation
  abstract: The Dean-Kawasaki equation is a fundamental SPDE from the theory of fluctuating hydrodynamics and has been proposed as a model for density fluctuations in large, finite-sized systems of diffusing particles. It is a highly singular SPDE that has been shown to only admit trivial martingale solutions which complicates mathematical approaches to its rigorous justification. In the recent work of Cornalba et al., it was shown that finite difference discretisations - a natural form of regularisation - accurately describe density fluctuations of diffusing particles in suitably weak metrics. In this contribution we significantly widen the applicability of numerical discretisations of the Dean-Kawasaki equation by considering a spatial discontinuous Galerkin (dG) approximation. Our method overcomes the restrictive grid requirements of finite-difference schemes whilst also being locally conservative and amenable to parallelisation. Simulating Dean-Kawasaki type equations is becoming increasingly important in applied sciences for studying fluctuation-driven behaviour in physical systems and this research lays the groundwork for future applications of dG-FEMs to more complex models such as weakly-interacting systems on irregular domains with mixed boundary conditions. Joint work with Federico Cornalba and Tony Shardlow.

